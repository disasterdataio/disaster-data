name: Refresh FEMA Data

# ── When to run ────────────────────────────────────────────────────────────
on:
  schedule:
    # Every Sunday at 4:00 AM UTC (midnight Eastern)
    - cron: '0 4 * * 0'

  # Adds a "Run workflow" button in the Actions tab for manual refreshes
  workflow_dispatch:

# ── What to do ─────────────────────────────────────────────────────────────
jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo so we have index.html to update
      - name: Check out repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install pandas requests

      # 4. Run the build script — fetches FEMA API and rewrites index.html
      - name: Build index.html
        run: python build.py

      # 5. Commit and push only if index.html actually changed
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit — data is already up to date."
          else
            git commit -m "Auto-refresh FEMA data $(date -u '+%Y-%m-%d')"
            git push
          fi
